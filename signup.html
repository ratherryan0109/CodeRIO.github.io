<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CodeRio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .redirect-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .redirect-card { max-width: 500px; padding: 3rem; }
    .redirect-card i { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }
    .redirect-card h2 { margin-bottom: 1rem; }
    .redirect-card p { color: var(--text-secondary); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
  <div class="redirect-container">
    <div class="redirect-card glass">
      <i class="fas fa-user-plus"></i>
      <h2>Create Your Account</h2>
      <p>Choose how you'd like to sign up for CodeRio.</p>
      <a href="auth/register.html" class="btn btn-primary btn-block" style="margin-bottom:0.8rem"><i class="fas fa-envelope"></i> Sign Up with Email</a>
      <a href="auth/register.html" class="btn btn-ghost btn-block"><i class="fas fa-arrow-right"></i> Alternative Options</a>
    </div>
  </div>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
